<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Surprise</title>
    <style>
        :root {
            --pink: #ffafcc;
            --soft-white: #fdf0d5;
            --dark-pink: #ff8fab;
            --tassel-color: #fb6f92;
        }

        body {
            background-color: var(--soft-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The Card Container */
        .card-container {
            perspective: 1000px;
            cursor: pointer;
        }

        .card {
            width: 300px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        /* Flip logic */
        .card.open {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            border: 4px solid white;
        }

        /* Front Side */
        .card-front {
            background-color: var(--pink);
            color: white;
        }

        .card-front h2 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        /* Back Side (The Message) */
        .card-back {
            background-color: white;
            color: var(--dark-pink);
            transform: rotateY(180deg);
            text-align: center;
            padding: 20px;
        }

        .card-back h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        /* Cute Tassels */
        .tassel {
            position: absolute;
            bottom: -20px;
            width: 4px;
            height: 30px;
            background: var(--tassel-color);
            border-radius: 2px;
        }

        .tassel::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -3px;
            width: 10px;
            height: 10px;
            background: var(--tassel-color);
            border-radius: 50%;
        }

        .t1 { left: 20%; height: 40px; }
        .t2 { left: 50%; height: 55px; }
        .t3 { left: 80%; height: 40px; }

        .heart {
            color: var(--dark-pink);
            font-size: 30px;
            margin-top: 10px;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="card-container" onclick="toggleCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <h2>OPEN</h2>
                <div class="tassel t1"></div>
                <div class="tassel t2"></div>
                <div class="tassel t3"></div>
            </div>
            <div class="card-face card-back">
                <h1>I love u!</h1>
                <div class="heart">❤</div>
            </div>
        </div>
    </div>

    <script>
        function toggleCard() {
            document.getElementById('card').classList.toggle('open');
        }
    </script>
</body>
</html>
